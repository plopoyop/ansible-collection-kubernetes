---
- name: "Include setup when enabled"
  ansible.builtin.include_tasks:
    file: "setup.yml"
    apply:
      tags:
        - "cert_manager"
        - "install"
  when: cert_manager_enabled
  tags:
    - "cert_manager"
    - "install"

- name: "Include cleanup when disabled"
  ansible.builtin.include_tasks:
    file: "cleanup.yml"
    apply:
      tags:
        - "cert_manager"
        - "uninstall"
  when: not cert_manager_enabled
  tags:
    - "cert_manager"
    - "uninstall"
