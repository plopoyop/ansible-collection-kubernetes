---
- name: Verify
  hosts: localhost
  connection: local
  gather_facts: true

  tasks:
    - name: "Wait for 'external-dns' namespace to be removed."
      kubernetes.core.k8s_info:
        kind: Namespace
        name: "external-dns"
      register: namespace_external_dns
      until: namespace_external_dns.resources | length == 0
      retries: 30
      delay: 5
      changed_when: false

    - name: "Assert that 'external-dns' namespace is removed."
      ansible.builtin.assert:
        that: namespace_external_dns.resources | length == 0
        fail_msg: "Namespace 'external-dns' is still present."
