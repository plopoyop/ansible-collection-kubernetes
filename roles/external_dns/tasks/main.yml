---
- name: "Include setup when enabled"
  ansible.builtin.include_tasks:
    file: "setup.yml"
    apply:
      tags:
        - "external_dns"
        - "install"
  when: external_dns_enabled
  tags: ["always"]

- name: "Include cleanup when disabled"
  ansible.builtin.include_tasks:
    file: "cleanup.yml"
    apply:
      tags:
        - "external_dns"
        - "uninstall"
  when: not external_dns_enabled
  tags: ["always"]
