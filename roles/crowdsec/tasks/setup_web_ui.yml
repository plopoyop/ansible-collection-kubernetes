---
- name: "Wait for CrowdSec LAPI pod to be running"
  kubernetes.core.k8s_info:
    kind: "Pod"
    namespace: "{{ crowdsec_namespace }}"
    label_selectors:
      - "k8s-app=crowdsec"
      - "type=lapi"
  register: crowdsec_lapi_pod_lookup
  retries: 60
  delay: 5
  until:
    - crowdsec_lapi_pod_lookup.resources is defined
    - crowdsec_lapi_pod_lookup.resources | length > 0
    - crowdsec_lapi_pod_lookup.resources[0].status.phase | default('') == 'Running'
  tags:
    - "helm_chart"

- name: "List CrowdSec LAPI machines"
  kubernetes.core.k8s_exec:
    namespace: "{{ crowdsec_namespace }}"
    pod: "{{ crowdsec_lapi_pod_lookup.resources[0].metadata.name }}"
    command: "cscli machines list -o json"
  register: "crowdsec_machines_list"
  changed_when: false
  tags:
    - "helm_chart"

- name: "Read Web UI password rotation marker"
  kubernetes.core.k8s_info:
    api_version: "v1"
    kind: "ConfigMap"
    name: "{{ crowdsec_web_ui_deployment_name }}-password-state"
    namespace: "{{ crowdsec_namespace }}"
  register: "crowdsec_web_ui_password_marker"
  tags:
    - "helm_chart"

- name: "Compute current Web UI password hash"
  ansible.builtin.set_fact:
    crowdsec_web_ui_password_current_hash: >-
      {{ crowdsec_web_ui_lapi_password | ansible.builtin.hash('sha256') }}
  no_log: true
  tags:
    - "helm_chart"

- name: "Detect Web UI password change"
  ansible.builtin.set_fact:
    crowdsec_web_ui_password_changed: >-
      {{ (crowdsec_web_ui_password_marker.resources | length == 0)
         or ((crowdsec_web_ui_password_marker.resources[0].data
              | default({})).password_hash | default(''))
            != crowdsec_web_ui_password_current_hash }}
    crowdsec_web_ui_machine_missing: >-
      {{ (crowdsec_machines_list.stdout | ansible.builtin.from_json
          | selectattr('machineId', 'equalto', crowdsec_web_ui_lapi_username)
          | list | length) == 0 }}
  tags:
    - "helm_chart"

- name: "Register CrowdSec Web UI machine in LAPI"
  kubernetes.core.k8s_exec:
    namespace: "{{ crowdsec_namespace }}"
    pod: "{{ crowdsec_lapi_pod_lookup.resources[0].metadata.name }}"
    command: >-
      cscli machines add {{ crowdsec_web_ui_lapi_username }}
      --password {{ crowdsec_web_ui_lapi_password }}
      --file /dev/null
      --force
  register: "crowdsec_web_ui_register_result"
  changed_when: true
  no_log: true
  when:
    - "not ansible_check_mode"
    - "crowdsec_web_ui_machine_missing or crowdsec_web_ui_password_changed"
  tags:
    - "helm_chart"

- name: "Store Web UI password rotation marker"
  kubernetes.core.k8s:
    state: "present"
    definition:
      apiVersion: "v1"
      kind: "ConfigMap"
      metadata:
        name: "{{ crowdsec_web_ui_deployment_name }}-password-state"
        namespace: "{{ crowdsec_namespace }}"
      data:
        password_hash: "{{ crowdsec_web_ui_password_current_hash }}"
  when:
    - "not ansible_check_mode"
    - "crowdsec_web_ui_register_result is succeeded"
    - "crowdsec_web_ui_register_result is not skipped"
  tags:
    - "helm_chart"

- name: "Add zekker6 helm repo for CrowdSec Web UI"
  kubernetes.core.helm_repository:
    name: "{{ crowdsec_web_ui_helm_repo_name }}"
    repo_url: "{{ crowdsec_web_ui_helm_repo_url }}"
  tags:
    - "helm_repository"

- name: "Install CrowdSec Web UI helm package"
  kubernetes.core.helm:
    name: "{{ crowdsec_web_ui_deployment_name }}"
    namespace: "{{ crowdsec_namespace }}"
    state: "present"
    chart_ref: "{{ crowdsec_web_ui_helm_chart_ref }}"
    chart_version: "{{ crowdsec_web_ui_helm_chart_version }}"
    update_repo_cache: true
    values: "{{ lookup('ansible.builtin.template', 'crowdsec_web_ui_helm_values.yml.j2') | ansible.builtin.from_yaml }}"
    wait: "{{ crowdsec_wait_install }}"
  tags:
    - "helm_chart"
