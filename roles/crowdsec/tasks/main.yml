---
- name: "Include setup when enabled"
  ansible.builtin.include_tasks:
    file: "setup.yml"
    apply:
      tags:
        - "crowdsec"
        - "install"
  when: crowdsec_enabled
  tags:
    - "crowdsec"
    - "install"

- name: "Include cleanup when disabled"
  ansible.builtin.include_tasks:
    file: "cleanup.yml"
    apply:
      tags:
        - "crowdsec"
        - "uninstall"
  when: not crowdsec_enabled
  tags:
    - "crowdsec"
    - "uninstall"
