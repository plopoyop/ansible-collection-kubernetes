---
- name: Verify
  hosts: localhost
  connection: local
  gather_facts: true

  tasks:
    - name: "Wait for 'crowdsec' namespace to be active."
      kubernetes.core.k8s_info:
        kind: Namespace
        name: "crowdsec"
      register: namespace_crowdsec
      until:
        - namespace_crowdsec.resources | length > 0
        - namespace_crowdsec.resources[0].status.phase == "Active"
      retries: 30
      delay: 5

    - name: "Assert that 'crowdsec' namespace is active."
      ansible.builtin.assert:
        that:
          - namespace_crowdsec.resources | length > 0
          - namespace_crowdsec.resources[0].status.phase == "Active"
        fail_msg: "Namespace 'crowdsec' is not active."

    - name: "Wait for 'crowdsec' LAPI Deployment to be deployed."
      kubernetes.core.k8s_info:
        kind: "Deployment"
        name: "crowdsec-lapi"
        namespace: "crowdsec"
      register: crowdsec_lapi_deployment
      until: crowdsec_lapi_deployment.resources | length > 0
      retries: 30
      delay: 5

    - name: "Assert that 'crowdsec' LAPI Deployment is deployed."
      ansible.builtin.assert:
        that: crowdsec_lapi_deployment.resources | length > 0
        fail_msg: "Deployment 'crowdsec-lapi' is not deployed."

    - name: "Assert that LAPI has BOUNCER_KEY_traefik env var."
      ansible.builtin.assert:
        that:
          - lapi_env | selectattr('name', 'equalto', 'BOUNCER_KEY_traefik') | list | length == 1
        fail_msg: "Deployment 'crowdsec-lapi' is missing BOUNCER_KEY_traefik env var."
      vars:
        lapi_env: >-
          {{ crowdsec_lapi_deployment['resources'][0]['spec']['template']['spec']['containers'][0]['env']
             | default([]) }}

    - name: "Wait for 'crowdsec' agent DaemonSet to be deployed."
      kubernetes.core.k8s_info:
        kind: "DaemonSet"
        name: "crowdsec-agent"
        namespace: "crowdsec"
      register: crowdsec_agent_daemonset
      until: crowdsec_agent_daemonset.resources | length > 0
      retries: 30
      delay: 5

    - name: "Assert that 'crowdsec' agent DaemonSet is deployed."
      ansible.builtin.assert:
        that: crowdsec_agent_daemonset.resources | length > 0
        fail_msg: "DaemonSet 'crowdsec-agent' is not deployed."

    - name: "Wait for 'crowdsec' AppSec Deployment to be deployed."
      kubernetes.core.k8s_info:
        kind: "Deployment"
        name: "crowdsec-appsec"
        namespace: "crowdsec"
      register: crowdsec_appsec_deployment
      until: crowdsec_appsec_deployment.resources | length > 0
      retries: 30
      delay: 5

    - name: "Assert that 'crowdsec' AppSec Deployment is deployed."
      ansible.builtin.assert:
        that: crowdsec_appsec_deployment.resources | length > 0
        fail_msg: "Deployment 'crowdsec-appsec' is not deployed."

    - name: "Assert that AppSec has COLLECTIONS env var set."
      ansible.builtin.assert:
        that:
          - appsec_env | selectattr('name', 'equalto', 'COLLECTIONS') | list | length == 1
        fail_msg: "Deployment 'crowdsec-appsec' is missing COLLECTIONS env var."
      vars:
        appsec_env: >-
          {{ crowdsec_appsec_deployment['resources'][0]['spec']['template']['spec']['containers'][0]['env']
             | default([]) }}

    - name: "Wait for 'crowdsec-appsec-service' Service to expose port 7422."
      kubernetes.core.k8s_info:
        kind: "Service"
        name: "crowdsec-appsec-service"
        namespace: "crowdsec"
      register: crowdsec_appsec_service
      until:
        - crowdsec_appsec_service.resources | length > 0
        - 7422 in (crowdsec_appsec_service.resources[0].spec.ports | map(attribute='port') | list)
      retries: 30
      delay: 5

    - name: "Assert that AppSec service exposes port 7422."
      ansible.builtin.assert:
        that:
          - crowdsec_appsec_service.resources | length > 0
          - 7422 in (crowdsec_appsec_service.resources[0].spec.ports | map(attribute='port') | list)
        fail_msg: "Service 'crowdsec-appsec-service' does not expose port 7422."
