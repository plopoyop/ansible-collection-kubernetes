---
- name: "Create ingress-controller namespace"
  kubernetes.core.k8s:
    name: "{{ traefik_namespace }}"
    api_version: "v1"
    kind: "Namespace"
    state: "present"
  tags:
    - "namespace"

- name: "Add ingress traefik helm repo"
  kubernetes.core.helm_repository:
    name: "{{ traefik_helm_repo_name }}"
    repo_url: "{{ traefik_helm_repo_url }}"
  tags:
    - "helm_repository"

- name: "Get currently installed Traefik releases"
  kubernetes.core.helm_info:
    name: "{{ item.name }}"
    release_namespace: "{{ traefik_namespace }}"
  register: "traefik_current_releases"
  loop: "{{ traefik_deployments }}"
  loop_control:
    label: "{{ item.name }}"

- name: "Upgrade CRDs for existing releases before helm upgrade"
  ansible.builtin.include_tasks: "upgrade_crds.yml"
  loop: "{{ traefik_current_releases.results }}"
  loop_control:
    loop_var: "traefik_current_release"
    label: "{{ traefik_current_release.item.name }}"
  when:
    - "traefik_crds_upgrade_enabled"
    - "traefik_current_release.status.chart is defined"
    - "traefik_current_release.item.state | default('present') == 'present'"

- name: "Install Kubernetes Gateway API CRDs"
  ansible.builtin.include_tasks: "install_gateway_api_crds.yml"
  when: "traefik_gateway_api_crds_install"
  tags:
    - "crds"

- name: "Instanciate ip addresses list"
  ansible.builtin.set_fact:
    traefik_ingress_ip_addresses_list: {}

- name: "Deploy instances"
  ansible.builtin.include_tasks: "deploy_instance.yml"
  loop: "{{ traefik_deployments }}"
  loop_control:
    loop_var: "traefik_current_instance"
  tags:
    - "helm_chart"

- name: "Create middlewares"
  kubernetes.core.k8s:
    namespace: "{{ current_traefik_middleware.namespace | default(traefik_namespace) }}"
    definition: >-
      {{ lookup('ansible.builtin.template', 'middleware.yml.j2') | ansible.builtin.from_yaml }}
    state: "{{ current_traefik_middleware.state | default('present') }}"
  loop: "{{ traefik_middlewares }}"
  loop_control:
    loop_var: "current_traefik_middleware"
  tags:
    - "manifest"

- name: "Create TCP middlewares"
  kubernetes.core.k8s:
    namespace: "{{ current_traefik_middleware.namespace | default(traefik_namespace) }}"
    definition: >-
      {{ lookup('ansible.builtin.template', 'middleware_tcp.yml.j2') | ansible.builtin.from_yaml }}
    state: "{{ current_traefik_middleware.state | default('present') }}"
  loop: "{{ traefik_middlewares_tcp }}"
  loop_control:
    loop_var: "current_traefik_middleware"
  tags:
    - "manifest"
